{% extends 'entry/base.html' %}
{% load static %}

{% block content %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>네컷일기 - 메인</title>
    <style>
        .main-body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; background-color: #f3f4f6; margin: 0; } .sidebar-toggle-button { position: fixed; top: 1rem; right: 1rem; z-index: 50; display: flex; flex-direction: column; justify-content: space-between; width: 2rem; height: 1.5rem; background: transparent; border: none; cursor: pointer; } .sidebar-toggle-button span { display: block; width: 100%; height: 3px; background-color: #1f2937; border-radius: 3px; transition: all 0.3s; } .sidebar-toggle-button.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); } .sidebar-toggle-button.open span:nth-child(2) { opacity: 0; } .sidebar-toggle-button.open span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); } .sidebar { position: fixed; top: 0; right: 0; height: 100%; width: 16rem; background: white; box-shadow: -2px 0 15px rgba(0,0,0,0.1); padding: 1.5rem; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease-in-out; z-index: 40; } .sidebar.open { transform: translateX(0); } .sidebar-profile { display: flex; flex-direction: column; align-items: center; margin-bottom: 1rem; } .profile-image { width: 5rem; height: 5rem; background-color: #e5e7eb; border-radius: 9999px; margin-bottom: 0.5rem; overflow: hidden; } .profile-image img { width: 100%; height: 100%; object-fit: cover; } .profile-name { font-weight: 600; font-size: 1.125rem; } .sidebar-nav { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; width: 100%; } .sidebar-nav a { text-align: left; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: background-color 0.2s; color: #374151; text-decoration: none; } .sidebar-nav a:hover { background-color: #f0f9ff; } .logout-button { margin-top: auto; width: 100%; padding: 0.5rem 1rem; border-radius: 0.5rem; background: #fee2e2; border: none; color: #ef4444; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: background-color 0.2s; } .logout-button:hover { background-color: #fecaca; } .main-content { padding: 2.5rem 1.5rem; }
    </style>
</head>

<body class="main-body">
    <button id="sidebar-toggle" class="sidebar-toggle-button"><span></span><span></span><span></span></button>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-profile">
            <div class="profile-image"><img src="https://via.placeholder.com/80" alt="프로필"></div>
            <span class="profile-name">{{ user.username }}님</span>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'profile' %}">내 정보</a>
            <a href="{% url 'settings' %}">환경설정</a>
        </nav>
        <div style="flex-grow: 1;"></div>
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="logout-button"><i data-lucide="log-out"></i><span>로그아웃</span></button>
        </form>
    </aside>

    <main id="main-content" class="container mt-4 main-content">
        <div class="row">
            <div class="col-md-5 border p-3">
                <h5>오늘의 일기</h5>
                <form id="add-form" method="post" action="">
                    {% csrf_token %}
                    <div class="form-group mb-3"><label class="form-label">제목</label><input type="text" name="note" class="form-control" placeholder="이 날을 한 줄로" required></div>
                    <div class="form-group mb-3"><label class="form-label">내용</label><textarea name="content" rows="10" class="form-control" placeholder="일기를 입력하세요" required></textarea></div>
                    <div class="form-group mb-3"><label class="form-label">오늘의 생산성</label><input type="range" name="productivity" min="0" max="10" value="5" step="1" class="form-control"></div>
                    <button type="submit" class="btn btn-primary w-100">저장 & 카드 제작</button>
                </form>
            </div>
            <div class="col-md-2 d-flex align-items-center justify-content-center">
                <div id="progress-wrapper" class="w-100" style="display: none;"><div class="text-center mb-2">이미지 생성 중...</div><div class="progress" style="height: 10px;"><div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div></div></div>
            </div>
            <div class="col-md-5 border p-3">
                <h5>오늘의 네컷 미리보기</h5>
                <div class="border mb-3 d-flex justify-content-center align-items-center" style="height: 400px;">
                    <img id="preview-image" src="" alt="미리보기" style="max-width: 100%; max-height: 100%; display: none;" />
                    <span id="preview-placeholder" class="text-muted">네컷</span>
                </div>
                <div class="d-flex justify-content-center">
                    <button type="button" class="btn btn-outline-secondary me-2" id="regenerate-btn" disabled>재생성</button>
                    <a id="detail-link" class="btn btn-outline-secondary disabled" href="#" tabindex="-1" aria-disabled="true">저장 확인</a>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    function getCookie(name) { const value = `; ${document.cookie}`; const parts = value.split(`; ${name}=`); if (parts.length === 2) return parts.pop().split(';').shift(); }
    const progressWrapper = document.getElementById('progress-wrapper'); const progressBar = document.getElementById('progress-bar'); const previewImage = document.getElementById('preview-image'); const previewPlaceholder = document.getElementById('preview-placeholder'); const regenerateBtn = document.getElementById('regenerate-btn'); const detailLink = document.getElementById('detail-link'); const NEW_DIARY_ID = {{ new_diary_id|default:'null' }};
    function animateProgressTo(target) { const current = parseInt(progressBar.style.width || '0'); const step = (target - current) / 30; let i = 0; const timer = setInterval(() => { i += 1; const next = Math.min(target, Math.round(current + step * i)); progressBar.style.width = next + '%'; if (next >= target || i >= 30) clearInterval(timer); }, 50); }
    async function startGeneration(id) { progressWrapper.style.display = 'block'; progressBar.style.width = '0%'; progressBar.classList.add('progress-bar-animated'); animateProgressTo(90); try { const resp = await fetch(`{% url 'generate_image' 0 %}`.replace('/0/', `/${id}/`), { method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') || '' } }); const data = await resp.json(); if (data.status === 'ok' && data.image_url) { progressBar.classList.remove('progress-bar-animated'); animateProgressTo(100); previewPlaceholder.style.display = 'none'; previewImage.src = data.image_url; previewImage.style.display = 'block'; regenerateBtn.disabled = false; detailLink.classList.remove('disabled'); detailLink.href = `{% url 'detail' 0 %}`.replace('/0', `/${id}`); } else throw new Error(data.message || '이미지 생성 실패'); } catch (e) { console.error(e); progressWrapper.style.display = 'none'; alert('이미지 생성 중 오류가 발생했습니다.'); } }
    if (NEW_DIARY_ID) startGeneration(NEW_DIARY_ID);
    regenerateBtn && regenerateBtn.addEventListener('click', () => { if (NEW_DIARY_ID) startGeneration(NEW_DIARY_ID); });
    const sidebar = document.getElementById('sidebar'); const sidebarToggle = document.getElementById('sidebar-toggle');
    sidebarToggle.addEventListener('click', () => { sidebar.classList.toggle('open'); sidebarToggle.classList.toggle('open'); });
    lucide.createIcons();
</script>
</body>
</html>
{% endblock %}
