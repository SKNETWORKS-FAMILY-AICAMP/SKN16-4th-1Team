{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Quill stylesheet -->
    <link href="https://cdn.quilljs.com/1.0.0/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Vollkorn&display=swap" rel="stylesheet">

    <!-- Bootstrap stylesheet -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
          crossorigin="anonymous">

    <title>{% block title %}Add Entry{% endblock %}</title>

    <style>
        /* 기존 add.html의 에디터 높이 보장 */
        html body div.container.contact-form form.mt-5 div.ql-container.ql-snow {
            height: 300px;
        }
        body { font-family: 'Vollkorn', serif; }

        html.dark body {
            background-color: #111827; /* 다크 모드 배경색 */
            color: #d1d5db; /* 다크 모드 기본 글자색 */
        }
        html.dark .bg-light {
            background-color: #1f2937 !important; /* Bootstrap의 bg-light를 어둡게 재정의 */
        }
        html.dark .navbar-brand, html.dark .nav-link {
            color: #d1d5db !important; /* 네비게이션 메뉴 글자색 */
        }
        html.dark .jumbotron {
            background-color: #1f2937; /* 점보트론 배경색 */
        }
        /* show.html의 카드 스타일 */
        html.dark .card {
            background-color: #374151;
            color: #d1d5db;
        }
        html.dark .card-title, html.dark .card-subtitle {
            color: #f9fafb !important;
        }
        html.dark .text-muted {
            color: #9ca3af !important;
        }

    </style>

    <script>
        // 페이지가 깜빡이는 것을 막기 위해 CSS나 다른 스크립트보다 먼저 실행됩니다.
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                // <html> 태그에 'dark' 클래스를 추가합니다.
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="{% url 'entry' %}">Diary App</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link mr-3 {% if add_highlight %}active{% endif %}" href="{% url 'productivity' %}">
                    <hr class="d-xl-none d-lg-none">
                    <img src="{% static 'icons/chart-line-solid.svg' %}" height="30" width="30" alt="Productivity Chart">
                    <span class="d-xl-none d-lg-none">&nbsp; Productivity Chart</span>
                    <hr class="d-xl-none d-lg-none">
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link mr-3 {% if add_highlight %}active{% endif %}" href="{% url 'entry' %}">
                    <img src="{% static 'icons/plus-square-solid.svg' %}" height="30" width="30" alt="Add Diaries">
                    <span class="d-xl-none d-lg-none">&nbsp; Add Diaries</span>
                    <hr class="d-xl-none d-lg-none">
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if show_highlight %}active{% endif %}" href="{% url 'show' %}">
                    <img src="{% static 'icons/book-solid.svg' %}" height="30" width="30" alt="Show Diaries">
                    <span class="d-xl-none d-lg-none">&nbsp; Show Diaries</span>
                    <hr class="d-xl-none d-lg-none">
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="jumbotron jumbotron-fluid text-center">
    <div class="container">
        <h1 class="display-4">{{ title }}</h1>
        <p class="lead">{{ subtitle }}</p>
    </div>
</div>

{% block content %}{% endblock %}
