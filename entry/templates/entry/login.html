{% extends 'entry/base_auth.html' %}

{% block title %}로그인{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-wrapper">
        <div class="auth-title">
            <h1>네컷일기</h1>
        </div>
        <div class="tab-menu">
            <a href="{% url 'login' %}" class="tab-item active">로그인</a>
            <a href="{% url 'signup' %}" class="tab-item">회원가입</a>
        </div>
        <form id="login-form" method="post">
            {% csrf_token %}
            {% if error %}
                <p class="error-message" style="text-align: center;">{{ error }}</p>
            {% endif %}
            <div class="input-group">
                <i data-lucide="mail"></i>
                <input type="email" id="email" name="username" placeholder="아이디(이메일)" required>
                <button type="button" class="btn-clear" id="clear-email">&times;</button>
            </div>
            <p class="error-message" id="email-error"></p>
            <div class="input-group">
                <i data-lucide="lock"></i>
                <input type="password" id="password" name="password" placeholder="비밀번호" required>
                <button type="button" class="btn-toggle-password" id="toggle-password">
                    <i data-lucide="eye"></i>
                </button>
            </div>
            <p class="error-message" id="password-error"></p>
            <button type="submit" class="btn-submit">로그인</button>
        </form>
    </div>
</div>
{% endblock %}
